version: 2

updates:
  # Gradle dependencies
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group all patch updates into one PR to reduce noise
      patch-updates:
        update-types:
          - patch

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
